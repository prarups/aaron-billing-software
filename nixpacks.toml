[phases.setup]
nixPkgs = ["python312", "gcc", "pkg-config", "cairo", "pango", "zlib", "postgresql", "libpqxx"]

[phases.install]
cmds = [
  "python -m venv /app/.venv",
  "/app/.venv/bin/pip install --upgrade pip",
  "/app/.venv/bin/pip install -r requirements.txt"
]

[phases.build]
# We use the full path to the virtual environment's Python
cmds = ["/app/.venv/bin/python manage.py collectstatic --noinput"]