[phases.setup]
nixPkgs = ["python312", "gcc", "pkg-config", "cairo", "pango", "zlib"]

[phases.install]
# Use '.' instead of 'source' and ensure pip is upgraded
cmds = [
  "python -m venv /app/.venv",
  ". /app/.venv/bin/activate && python -m pip install --upgrade pip && pip install -r requirements.txt"
]

[phases.build]
cmds = ["python manage.py collectstatic --noinput"]